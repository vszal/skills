cases:
- id: "gke_compute_class_maximize_obtainability"
  prompt: "As a platform engineer, how do I use GKE ComputeClasses to maximize obtainability for a GPU-intensive workload?"
  metadata:
    products:
    - "GKE"
  rubric:
  - "The response recommends an intent-based priority list with multiple machine families or zones."
  - "The response mentions using 'activeMigration' to return to the preferred tier once capacity is available."
  - "The response suggests using multiple zones to mitigate regional stockouts."

- id: "gke_compute_class_karpenter_migration"
  prompt: "I am migrating from Karpenter on EKS to GKE. How do I translate my Karpenter NodePools to GKE ComputeClasses?"
  metadata:
    products:
    - "GKE"
  rubric:
  - "The response correctly maps Karpenter NodePools to GKE ComputeClasses (CCC)."
  - "The response explains that Karpenter 'weights' map to the top-to-bottom order of the CCC 'priorities' list."
  - "The response mentions translating Karpenter 'drift' to CCC 'activeMigration'."
  - "The response identifies that node labels and taints are defined in the 'nodePoolConfig' or per-priority section of the CCC."

- id: "gke_compute_class_cost_optimization"
  prompt: "How can I implement a cost-optimized Spot-first strategy with an On-Demand fallback using ComputeClasses?"
  metadata:
    products:
    - "GKE"
  rubric:
  - "The response provides a YAML example or description of a CCC with Spot priorities at the top."
  - "The response includes an On-Demand priority as a lower-priority fallback."
  - "The response mentions that workloads must tolerate the Spot taint or that the CCC handles auto-toleration."
  - "The response discusses the trade-off between cost and preemption risk."

- id: "gke_compute_class_troubleshooting"
  prompt: "My pods are stuck in Pending even though I have a ComputeClass defined. How do I debug why NAC isn't creating nodes?"
  metadata:
    products:
    - "GKE"
  rubric:
  - "The response suggests checking the ComputeClass status using 'kubectl describe computeclass'."
  - "The response mentions inspecting Cluster Autoscaler visibility logs or events ('kubectl get events')."
  - "The response identifies common causes like stockouts, conflicting pod affinity/selectors, or quota limits."
  - "The response recommends verifying that 'nodePoolAutoCreation.enabled' is set to true."

- id: "gke_compute_class_database_tuning"
  prompt: "How do I configure a ComputeClass for a high-performance Postgres database that needs specific kernel tunings?"
  metadata:
    products:
    - "GKE"
  rubric:
  - "The response recommends using 'nodeSystemConfig.linuxNodeConfig' for sysctls and hugepages."
  - "The response mentions using 'machineFamily: n4' or similar performance-optimized families."
  - "The response suggests configuring boot disk types (e.g., hyperdisk-balanced) to match performance needs."
  - "The response mentions binding the CCC to a manual node pool if zero-latency scheduling is required."

- id: "gke_compute_class_gpu_toleration"
  prompt: "I created a ComputeClass for L4 GPUs and assigned it to my Pod via nodeSelector, but it's stuck in Pending. The autoscaler logs show 'noScaleUp'. The node pool creates successfully if I do it manually. What is missing in my Pod spec?"
  metadata:
    products:
    - "GKE"
  rubric:
  - "The response identifies that the Pod is missing the `nvidia.com/gpu: Exists` toleration."
  - "The response explains that GKE auto-taints GPU nodes, so the toleration is required for scheduling."

- id: "gke_compute_class_scaleupanyway_fallback"
  prompt: "My ComputeClass has priorities for C3 and N4 nodes, but GKE is creating E2 nodes instead. Why is this happening and how do I strictly enforce my machine families?"
  metadata:
    products:
    - "GKE"
  rubric:
  - "The response identifies that `whenUnsatisfiable: ScaleUpAnyway` causes GKE to fallback to E2 nodes."
  - "The response recommends changing `whenUnsatisfiable` to `DoNotScaleUp` to strictly enforce the requested machine families."

- id: "gke_compute_class_active_migration_blocked"
  prompt: "I enabled `activeMigration: { optimizeRulePriority: true }` to move from On-Demand back to Spot. I see Spot capacity is available, but my Pods are still on On-Demand nodes. What could be preventing the migration?"
  metadata:
    products:
    - "GKE"
  rubric:
  - "The response identifies Pod Disruption Budgets (PDBs) as the likely blocker."
  - "The response explains that active migration respects PDBs and will not evict if it violates the budget."

- id: "gke_compute_class_imagetype_bug"
  prompt: "After adding `imageType: UBUNTU_CONTAINERD` to my ComputeClass, the autoscaler started creating hundreds of tiny, fragmented node pools. We are on GKE 1.33.4. What's wrong?"
  metadata:
    products:
    - "GKE"
  rubric:
  - "The response identifies a known bug in pre-1.33.5 where ImageType causes excessive node pool creation."
  - "The response recommends upgrading the GKE version or removing the `imageType` field."