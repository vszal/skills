# EXAMPLE TEMPLATE - DO NOT DEPLOY
apiVersion: cloud.google.com/v1
kind: ComputeClass
metadata:
  name: spark-zonal-class
spec:
  # Optimized for Apache Spark on GKE: 
  # - Tier 1: C3D/C3 families for high-performance networking and Titanium SSDs.
  # - Tier 2: N2D fallback to maintain Local SSD support for shuffle performance.
  # - Tier 3: N4 cost-optimized Spot floor (Hyperdisk-only).
  #
  # PROXIMITY GUIDANCE:
  # To minimize cross-zonal shuffle costs and latency, executors should be 
  # co-located in the same zone as the driver using Pod Affinity.
  #
  nodePoolAutoCreation:
    enabled: true

  nodePoolConfig:
    imageType: cos_containerd

  # Disable activeMigration for batch stability. 
  # Mid-job preemption of an executor forces expensive re-computation of the RDD lineage.
  activeMigration:
    optimizeRulePriority: false

  autoscalingPolicy:
    consolidationDelayMinutes: 5
    consolidationThreshold: 50

  priorityDefaults:
    location:
      zones: ['us-central1-a', 'us-central1-b', 'us-central1-c'] 
      locationPolicy: ANY
    
    nodeSystemConfig:
      linuxNodeConfig:
        sysctls:
          net.core.somaxconn: 2048
          net.ipv4.tcp_tw_reuse: 1
          vm.max_map_count: 262144
          vm.swappiness: 1
      
      kubeletConfig:
        cpuManagerPolicy: static

  priorities:
  - machineFamily: c3d # IMPORTANT: Align machineFamily with your existing CUDs/Reservations
    # C3D (AMD) offers best price-performance and large Titanium Local SSD capacity.
    storage:
      bootDiskSize: 100
      bootDiskType: hyperdisk-balanced 
      localSSDCount: 2 
    spot: false
    priorityScore: 100

  - machineFamily: c3 # IMPORTANT: Align machineFamily with your existing CUDs/Reservations
    # C3 (Intel) performance fallback with Titanium Local SSDs.
    storage:
      bootDiskSize: 100
      bootDiskType: hyperdisk-balanced 
      localSSDCount: 2 
    spot: false
    priorityScore: 80

  - machineFamily: n2d # IMPORTANT: Align machineFamily with your existing CUDs/Reservations
    # N2D (AMD) is a critical fallback that still supports Local SSDs. 
    # Use this to avoid the "shuffle bottleneck" of moving to Hyperdisk/PD-only families.
    storage:
      bootDiskSize: 100
      bootDiskType: pd-balanced 
      localSSDCount: 2
    spot: true # Spot N2D provides excellent price-performance for shuffle-heavy jobs.
    priorityScore: 60

  - machineFamily: n4 # IMPORTANT: Align machineFamily with your existing CUDs/Reservations
    # N4 cost-optimized Spot floor. NOTE: N4 does NOT support Local SSDs.
    storage:
      bootDiskSize: 100
      bootDiskType: hyperdisk-balanced
    spot: true 
    priorityScore: 40

  whenUnsatisfiable: ScaleUpAnyway
