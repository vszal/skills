apiVersion: cloud.google.com/v1
kind: ComputeClass
metadata:
  name: kafka-broker
spec:
  description: "Kafka broker — multi-zone, local SSD for page cache and segment scratch, Hyperdisk durable boot, all-Gen-4, no Spot."
  nodePoolAutoCreation:
    enabled: true
  nodePoolConfig:
    imageStreaming:
      enabled: true
    gvnic:
      enabled: true
  priorityDefaults:
    location:
      zones: ['us-central1-a', 'us-central1-b', 'us-central1-c']
    nodeSystemConfig:
      linuxNodeConfig:
        sysctls:
          net.core.somaxconn: 4096
          vm.max_map_count: 262144   # Kafka mmaps many log segments
          fs.file-max: 1000000       # broker holds many open file descriptors
        transparentHugepageEnabled: TRANSPARENT_HUGEPAGE_ENABLED_MADVISE
  priorities:
  # 1. n4 with local SSD for page cache + segment scratch
  - machineFamily: n4
    minCores: 16
    minMemoryGb: 64
    spot: false
    storage:
      bootDiskType: hyperdisk-balanced
      bootDiskSize: 100
      localSSDCount: 2

  # 2. c4 fallback (Gen 4) — same zones, no local SSD
  - machineFamily: c4
    minCores: 16
    minMemoryGb: 64
    spot: false
    storage:
      bootDiskType: hyperdisk-balanced
      bootDiskSize: 100

  # 3. Last resort — n4 with wider zone net
  - machineFamily: n4
    minCores: 16
    minMemoryGb: 64
    spot: false
    location:
      zones: ['us-central1-a', 'us-central1-b', 'us-central1-c', 'us-central1-f']
      locationPolicy: ANY
    storage:
      bootDiskType: hyperdisk-balanced
      bootDiskSize: 100

