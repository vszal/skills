apiVersion: cloud.google.com/v1
kind: ComputeClass
metadata:
  name: shared-l4-inference
spec:
  description: "Shared L4 GPU class for multi-tenant low-utilization inference (dev/staging, batch eval, small-model APIs). MPS sharing with up to 4 clients/GPU."
  nodePoolAutoCreation:
    enabled: true
  nodePoolConfig:
    imageStreaming:
      enabled: true
    gvnic:
      enabled: true
  priorityDefaults:
    location:
      zones: ['us-central1-a', 'us-central1-b', 'us-central1-c']
  priorities:
  # 1. Spot, single L4 with MPS — cheapest path for tolerant workloads
  - gpu:
      count: 1
      type: nvidia-l4
      driverVersion: default
      gpuSharing:
        sharingStrategy: MPS
        maxSharedClientsPerGPU: 4
    machineType: g2-standard-8
    spot: true

  # 2. Spot, 2× L4 — packs more concurrent clients per node (8 clients/node)
  - gpu:
      count: 2
      type: nvidia-l4
      driverVersion: default
      gpuSharing:
        sharingStrategy: MPS
        maxSharedClientsPerGPU: 4
    machineType: g2-standard-24
    spot: true

  # 3. On-Demand floor with sharing
  - gpu:
      count: 1
      type: nvidia-l4
      driverVersion: default
      gpuSharing:
        sharingStrategy: MPS
        maxSharedClientsPerGPU: 4
    machineType: g2-standard-8
    spot: false
