apiVersion: cloud.google.com/v1
kind: ComputeClass
metadata:
  name: postgres-primary
spec:
  description: "Primary Postgres node, zone-pinned for PV affinity. Reservation-first, On-Demand fallback, all-Gen-4 (Hyperdisk), no Spot."
  nodePoolAutoCreation:
    enabled: true
  nodePoolConfig:
    imageStreaming:
      enabled: true
    gvnic:
      enabled: true
  # NOTE: priorityDefaults.location omitted — it would conflict with the
  # Specific reservation on priority 1. Reservation zone scope lives in
  # reservations.specific[].zones; non-reservation priorities set
  # location.zones explicitly.
  priorityDefaults:
    nodeSystemConfig:
      linuxNodeConfig:
        sysctls:
          net.core.somaxconn: 1024
          vm.overcommit_memory: 2   # strict — prevents OOM-killer surprises on large queries
        transparentHugepageEnabled: TRANSPARENT_HUGEPAGE_ENABLED_NEVER
  priorities:
  # 1. Specific reservation — pre-paid, highest obtainability
  - machineFamily: n4
    minCores: 16
    minMemoryGb: 128
    spot: false
    reservations:
      affinity: Specific
      specific:
      - name: postgres-primary-reservation
        zones: ['us-central1-a']    # zonal scope lives here for the reservation entry
    storage:
      bootDiskType: hyperdisk-balanced
      bootDiskSize: 100

  # 2. On-Demand n4 highmem in same zone (PV affinity)
  - machineFamily: n4
    minCores: 16
    minMemoryGb: 128
    spot: false
    location:
      zones: ['us-central1-a']
    storage:
      bootDiskType: hyperdisk-balanced
      bootDiskSize: 100

  # 3. c4 fallback (still Gen 4, Hyperdisk-compatible) in same zone
  - machineFamily: c4
    minCores: 16
    minMemoryGb: 128
    spot: false
    location:
      zones: ['us-central1-a']
    storage:
      bootDiskType: hyperdisk-balanced
      bootDiskSize: 100
