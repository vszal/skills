cases:
- id: "gke_autoscaling_enable_ca"
  prompt: "How do I enable cluster autoscaler on an existing GKE node pool named 'my-pool' with a range of 1 to 5 nodes?"
  metadata:
    products:
    - "GKE"
  rubric:
  - "The response provides the 'gcloud container clusters update' command."
  - "The response includes '--enable-autoscaling', '--node-pool=my-pool', '--min-nodes=1', and '--max-nodes=5'."
  - "The response correctly identifies the location (zone or region) must be specified."

- id: "gke_autoscaling_debug_pending"
  prompt: "My pods are stuck in Pending and the autoscaler isn't adding nodes. How do I debug this?"
  metadata:
    products:
    - "GKE"
  rubric:
  - "The response recommends checking 'kubectl describe pod' for events."
  - "The response suggests inspecting Cluster Autoscaler visibility logs ('container.googleapis.com/cluster-autoscaler-visibility')."
  - "The response mentions checking if the pod resource requests fit the node pool's machine type or if '--max-nodes' has been reached."
  - "The response identifies CCC-specific blockers like 'whenUnsatisfiable: DoNotScaleUp'."

- id: "gke_autoscaling_optimize_consolidation"
  prompt: "I want my GKE cluster to remove underutilized nodes more aggressively to save costs. What settings should I change?"
  metadata:
    products:
    - "GKE"
  rubric:
  - "The response recommends setting the autoscaling profile to 'optimize-utilization'."
  - "The response suggests tuning 'consolidationThreshold' and 'consolidationDelayMinutes' in the ComputeClass."
  - "The response mentions that 'consolidationThreshold: 0' is the most aggressive setting."
  - "The response warns about PodDisruptionBudgets or 'safe-to-evict' annotations that might block scale-down."

- id: "gke_autoscaling_spot_obtainability"
  prompt: "How should I configure the location policy for a Spot VM workload to ensure it gets scheduled even if capacity is tight?"
  metadata:
    products:
    - "GKE"
  rubric:
  - "The response recommends setting '--location-policy=ANY'."
  - "The response explains that 'ANY' maximizes obtainability by trying all zones in parallel for Spot capacity."
  - "The response mentions that this can be set on a manual node pool or within a ComputeClass priority."

- id: "gke_autoscaling_prewarming"
  prompt: "My bursty application suffers from high latency because NAC takes too long to create new node pools. Is there a way to pre-warm capacity?"
  metadata:
    products:
    - "GKE"
  rubric:
  - "The response suggests using Capacity Buffers (autoscaling.x-k8s.io/v1beta1)."
  - "The response explains the 'active-capacity' vs 'standby-capacity' strategies."
  - "The response mentions that the buffer should match the target ComputeClass via a nodeSelector."

- id: "gke_autoscaling_karpenter_migration"
  prompt: "We are migrating from EKS using Karpenter with 'consolidateAfter: 30s'. How can I achieve similar sub-minute consolidation behavior in GKE ComputeClasses?"
  metadata:
    products:
    - "GKE"
  rubric:
  - "The response correctly states that GKE's 'consolidationDelayMinutes' has a minimum floor of 1 minute."
  - "The response identifies that sub-minute consolidation is not currently supported in GKE ComputeClasses."
  - "The response suggests using 'consolidationThreshold: 0' for maximum aggression within that 1-minute limit."

- id: "gke_autoscaling_blocker_local_ssd"
  prompt: "My Spark pipeline pods use local SSDs for shuffle data. After the jobs finish, the nodes stay idle and aren't being removed. What is likely blocking scale-down?"
  metadata:
    products:
    - "GKE"
  rubric:
  - "The response identifies pods with local storage (local SSD, emptyDir, hostPath) as primary scale-down blockers."
  - "The response suggests checking for other blockers like 'safe-to-evict: false' or bare pods."
  - "The response recommends using 'assets/find-scale-down-blockers.sh' to diagnose the specific pods."

- id: "gke_autoscaling_per_class_tuning"
  prompt: "How can I configure my cluster so that batch workloads consolidate aggressively to save costs, while serving workloads keep a bit of spare capacity to avoid pending pods on spikes?"
  metadata:
    products:
    - "GKE"
  rubric:
  - "The response recommends using per-class 'autoscalingPolicy' in ComputeClasses."
  - "For batch: suggest 'consolidationThreshold: 0' and short 'consolidationDelayMinutes: 1'."
  - "For serving: suggest leaving thresholds at default/low, increasing 'consolidationDelayMinutes' (5-10), or using Capacity Buffers."

- id: "gke_autoscaling_pod_topology_spread"
  prompt: "We want to ensure our pods are evenly spread across zones for high availability. We heard the Cluster Autoscaler doesn't support Pod Topology Spread constraints. Is that true, and how should we configure it?"
  metadata:
    products:
    - "GKE"
  rubric:
  - "The response clarifies that Cluster Autoscaler now fully supports Pod Topology Spread constraints."
  - "The response states that `whenUnsatisfiable: DoNotSchedule` must be used for CA compatibility."
  - "The response provides a YAML example of the topologySpreadConstraints configuration."

- id: "gke_autoscaling_cuds_vs_reservations"
  prompt: "We just purchased specific GCP capacity reservations and Committed Use Discounts (CUDs) for N4 machine types. How do we configure the Cluster Autoscaler or ComputeClasses to consume them?"
  metadata:
    products:
    - "GKE"
  rubric:
  - "The response mentions that CUDs are consumed automatically by the autoscaler without explicit configuration."
  - "The response explains that Reservations are NOT automatically consumed and must be explicitly targeted."
  - "The response suggests configuring consumption via the Node Pool API or a ComputeClass 'reservations' block."

- id: "gke_autoscaling_system_pod_segregation"
  prompt: "Our expensive GPU and high-memory spot nodes aren't scaling down because `kube-system` pods like `metrics-server` and `coredns` are landing on them. How do we stop system pods from pinning these nodes?"
  metadata:
    products:
    - "GKE"
  rubric:
  - "The response recommends segregating system pods via a namespace default CCC."
  - "The response specifies labeling the `kube-system` namespace with `cloud.google.com/default-compute-class-non-daemonset=system-pool`."
  - "The response suggests creating a 'cheap' system-pool CCC to catch these workloads."

- id: "gke_autoscaling_performance_sluggishness"
  prompt: "Our GKE cluster has over 250 node pools created by NAC and we heavily use `requiredDuringSchedulingIgnoredDuringExecution` pod anti-affinity. Recently, the cluster autoscaler has become extremely slow to provision new nodes. Why?"
  metadata:
    products:
    - "GKE"
  rubric:
  - "The response identifies that having over 200 node pools slows down the autoscaler."
  - "The response identifies that 'required' anti-affinity explodes scheduler cost at scale."
  - "The response recommends consolidating CCCs and switching to 'preferred' anti-affinity or 'topologySpreadConstraints'."

- id: "gke_autoscaling_log_debugging"
  prompt: "I'm seeing scale-up issues in my cluster and I need to see the raw decisions made by the autoscaler. Where do I find these logs and is there a way to stream them?"
  metadata:
    products:
    - "GKE"
  rubric:
  - "The response recommends checking the 'Cluster Autoscaler visibility logs' in Cloud Logging."
  - "The response identifies the log ID as 'container.googleapis.com/cluster-autoscaler-visibility'."
- "The response recommends using the 'log-autoscaler-events.sh' script located in the assets directory to tail these events."